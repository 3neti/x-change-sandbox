driver:
  id: vouchers.recent
  version: 1.0.0
  title: Recent Vouchers
  description: Last 10 vouchers generated
  group: vouchers
  icon: ticket

columns:
  - key: code
    label: Voucher Code
    type: text
    sortable: true
  - key: amount
    label: Amount
    type: currency
    sortable: true
  - key: voucher_type
    label: Type
    type: badge
    sortable: false
  - key: state
    label: Status
    type: badge
    sortable: true
  - key: created_at
    label: Created
    type: datetime
    sortable: true

filters:
  - key: voucher_type
    label: Type
    type: select
    options: [redeemable, payable, settlement]
  - key: state
    label: Status
    type: select
    options: [active, redeemed, pending, expired, locked, closed, cancelled]

defaults:
  sort: created_at
  sort_direction: desc
  per_page: 10

resolver: LBHurtado\Voucher\Reports\Resolvers\RecentVouchersResolver
