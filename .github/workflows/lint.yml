name: linter

on:
  push:
    branches: [develop, main, master, workos]
  pull_request:
    branches: [develop, main, master, workos]

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/x-change

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Validate composer.json
        run: composer validate --no-check-lock --strict

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: packages/x-change/package-lock.json

      - name: Install Node Dependencies
        run: npm ci

      - name: Format Frontend Check
        run: npm run format --if-present

      - name: Lint Frontend
        run: npm run lint --if-present
