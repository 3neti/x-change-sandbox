name: tests

on:
  push:
    branches: [develop, main, master, workos]
  pull_request:
    branches: [develop, main, master, workos]

jobs:
  ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/x-change

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Show PHP version
        run: php -v

      - name: Validate composer.json
        run: composer validate --no-check-lock --strict

      - name: Show Composer config
        run: composer config repositories --no-interaction || true
